<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Over 1.5 Goals Analyzer v4</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500;700&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0c0f;
      --surface: #111318;
      --surface2: #181c23;
      --border: #1e2530;
      --accent: #00e5a0;
      --accent-dim: rgba(0,229,160,0.12);
      --warn: #ff5c38;
      --warn-dim: rgba(255,92,56,0.12);
      --gold: #f5c518;
      --gold-dim: rgba(245,197,24,0.12);
      --text: #e8eaf0;
      --text-dim: #6b7280;
      --text-mid: #9ca3af;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Grid noise overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,229,160,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,160,0.015) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 20px 60px;
    }

    /* HEADER */
    header {
      padding: 32px 0 24px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 32px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .logo-block h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(28px, 5vw, 48px);
      letter-spacing: 3px;
      color: var(--text);
      line-height: 1;
    }

    .logo-block h1 span {
      color: var(--accent);
    }

    .logo-block p {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 2px;
      margin-top: 6px;
      text-transform: uppercase;
    }

    .header-meta {
      text-align: right;
    }

    #date-display {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      color: var(--accent);
      letter-spacing: 1px;
    }

    #status-line {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 4px;
    }

    /* CONTROLS */
    .controls {
      display: flex;
      gap: 12px;
      margin-bottom: 28px;
      flex-wrap: wrap;
      align-items: center;
    }

    .btn {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      border: none;
      cursor: pointer;
      padding: 10px 20px;
      border-radius: 3px;
      transition: all 0.15s;
    }

    .btn-primary {
      background: var(--accent);
      color: #000;
    }

    .btn-primary:hover {
      background: #00ffc0;
      transform: translateY(-1px);
    }

    .btn-primary:disabled {
      background: #1e3530;
      color: var(--text-dim);
      cursor: not-allowed;
      transform: none;
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-mid);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .filter-group {
      display: flex;
      gap: 8px;
      margin-left: auto;
      flex-wrap: wrap;
    }

    .filter-btn {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      letter-spacing: 1px;
      padding: 7px 14px;
      border-radius: 3px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-mid);
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }

    /* SUMMARY BAR */
    .summary-bar {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 14px 16px;
    }

    .stat-card .label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 6px;
    }

    .stat-card .value {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 1px;
      line-height: 1;
    }

    .stat-card.bets .value { color: var(--accent); }
    .stat-card.skips .value { color: var(--warn); }
    .stat-card.total .value { color: var(--text); }
    .stat-card.avg-odds .value { color: var(--gold); }

    /* LOADING */
    #loader {
      display: none;
      text-align: center;
      padding: 80px 20px;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #loader p {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      color: var(--text-dim);
      letter-spacing: 2px;
    }

    #loader .load-step {
      font-size: 11px;
      color: var(--accent);
      margin-top: 8px;
      min-height: 18px;
    }

    /* ERROR */
    #error-box {
      display: none;
      background: var(--warn-dim);
      border: 1px solid var(--warn);
      border-radius: 4px;
      padding: 16px 20px;
      margin-bottom: 24px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      color: var(--warn);
    }

    /* MATCH CARDS */
    #results {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .match-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      transition: border-color 0.2s;
      animation: fadeUp 0.3s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .match-card.bet { border-left: 3px solid var(--accent); }
    .match-card.skip { border-left: 3px solid var(--warn); }
    .match-card.marginal { border-left: 3px solid var(--gold); }

    .card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      cursor: pointer;
      user-select: none;
    }

    .card-header:hover { background: var(--surface2); }

    .verdict-badge {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 14px;
      letter-spacing: 2px;
      padding: 4px 10px;
      border-radius: 2px;
      min-width: 60px;
      text-align: center;
      flex-shrink: 0;
    }

    .bet .verdict-badge { background: var(--accent-dim); color: var(--accent); border: 1px solid var(--accent); }
    .skip .verdict-badge { background: var(--warn-dim); color: var(--warn); border: 1px solid var(--warn); }
    .marginal .verdict-badge { background: var(--gold-dim); color: var(--gold); border: 1px solid var(--gold); }

    .match-teams {
      flex: 1;
      min-width: 0;
    }

    .match-name {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .match-meta {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--text-dim);
      margin-top: 3px;
      letter-spacing: 0.5px;
    }

    .score-bar {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    .score-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 1px;
      min-width: 36px;
      text-align: center;
    }

    .bet .score-num { color: var(--accent); }
    .skip .score-num { color: var(--warn); }
    .marginal .score-num { color: var(--gold); }

    .score-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      color: var(--text-dim);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .odds-chip {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      font-weight: 700;
      color: var(--gold);
      background: var(--gold-dim);
      border: 1px solid rgba(245,197,24,0.25);
      padding: 4px 10px;
      border-radius: 3px;
      min-width: 52px;
      text-align: center;
      flex-shrink: 0;
    }

    .expand-icon {
      color: var(--text-dim);
      font-size: 14px;
      flex-shrink: 0;
      transition: transform 0.2s;
    }

    .match-card.open .expand-icon { transform: rotate(180deg); }

    /* CARD DETAIL */
    .card-detail {
      display: none;
      border-top: 1px solid var(--border);
      padding: 16px;
      background: var(--surface2);
    }

    .match-card.open .card-detail { display: block; }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
    }

    .detail-section h4 {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }

    .signal-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 0;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
    }

    .signal-row .sig-label { color: var(--text-mid); }

    .sig-val { font-weight: 700; }
    .sig-pos { color: var(--accent); }
    .sig-neg { color: var(--warn); }
    .sig-neu { color: var(--text-dim); }

    .reason-text {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 12px;
      color: var(--text-mid);
      line-height: 1.6;
      margin-top: 4px;
    }

    /* EMPTY STATE */
    #empty-state {
      display: none;
      text-align: center;
      padding: 80px 20px;
      color: var(--text-dim);
    }

    #empty-state .big {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 48px;
      letter-spacing: 4px;
      color: var(--border);
      display: block;
      margin-bottom: 12px;
    }

    #empty-state p {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      letter-spacing: 1px;
    }

    /* PROGRESS BAR */
    .score-progress {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      margin-top: 6px;
      overflow: hidden;
    }

    .score-progress-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.5s ease;
    }

    .bet .score-progress-fill { background: var(--accent); }
    .skip .score-progress-fill { background: var(--warn); }
    .marginal .score-progress-fill { background: var(--gold); }

    /* FOOTER */
    footer {
      margin-top: 48px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    footer span {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 1px;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .score-bar { gap: 10px; }
      .odds-chip { display: none; }
      .filter-group { margin-left: 0; width: 100%; }
    }
  </style>
</head>
<body>
<div class="wrapper">

  <header>
    <div class="logo-block">
      <h1>OVER <span>1.5</span> GOALS</h1>
      <p>Analyzer v4 &mdash; Fully Automated &mdash; Paddy Power</p>
    </div>
    <div class="header-meta">
      <div id="date-display">--</div>
      <div id="status-line">AWAITING SCAN</div>
    </div>
  </header>

  <div class="controls">
    <button class="btn btn-primary" id="scanBtn" onclick="runScan()">⚡ SCAN TODAY</button>
    <button class="btn btn-ghost" id="refreshBtn" onclick="runScan()" style="display:none">↺ REFRESH</button>
    <div class="filter-group">
      <button class="filter-btn active" onclick="setFilter('all', this)">ALL</button>
      <button class="filter-btn" onclick="setFilter('bet', this)">BET</button>
      <button class="filter-btn" onclick="setFilter('marginal', this)">MARGINAL</button>
      <button class="filter-btn" onclick="setFilter('skip', this)">SKIP</button>
    </div>
  </div>

  <div class="summary-bar">
    <div class="stat-card total">
      <div class="label">Fixtures</div>
      <div class="value" id="stat-total">0</div>
    </div>
    <div class="stat-card bets">
      <div class="label">Bet</div>
      <div class="value" id="stat-bets">0</div>
    </div>
    <div class="stat-card" style="--c:var(--gold)">
      <div class="label">Marginal</div>
      <div class="value" style="color:var(--gold)" id="stat-marginal">0</div>
    </div>
    <div class="stat-card skips">
      <div class="label">Skip</div>
      <div class="value" id="stat-skips">0</div>
    </div>
    <div class="stat-card avg-odds">
      <div class="label">Avg Odds (Bet)</div>
      <div class="value" id="stat-avgodds">—</div>
    </div>
  </div>

  <div id="error-box"></div>

  <div id="loader">
    <div class="spinner"></div>
    <p>SCANNING MARKETS</p>
    <div class="load-step" id="load-step">Connecting to The Odds API...</div>
  </div>

  <div id="empty-state">
    <span class="big">NO DATA</span>
    <p>Hit SCAN TODAY to load fixtures and odds</p>
  </div>

  <div id="results"></div>

  <footer>
    <span>OVER 1.5 GOALS ANALYZER v4</span>
    <span>SOURCE: THE-ODDS-API + FOOTBALL-DATA.ORG</span>
    <span id="last-updated">—</span>
  </footer>

</div>

<script src="config.js"></script>
<script src="analyzer.js"></script>
<script>
  // Set date on load
  document.getElementById('date-display').textContent =
    new Date().toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short', year:'numeric' }).toUpperCase();

  // Show empty state on load
  document.getElementById('empty-state').style.display = 'block';
</script>
</body>
</html>
