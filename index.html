<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Over 1.5 · v3</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080a0d;
    --surface: #0f1318;
    --card: #141920;
    --card2: #1a2028;
    --border: #1e2730;
    --green: #00e676;
    --green-dim: rgba(0,230,118,0.12);
    --red: #ff5252;
    --red-dim: rgba(255,82,82,0.1);
    --amber: #ffab40;
    --blue: #40c4ff;
    --muted: #3d4f5c;
    --text: #dde8f0;
    --subtext: #6b8090;
    --accent: #00e676;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;min-height:100vh;padding:0 0 60px;}

  /* grain overlay */
  body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:0.4;}

  .wrap{position:relative;z-index:1;max-width:860px;margin:0 auto;padding:0 14px;}

  /* HEADER */
  .hdr{padding:22px 0 16px;border-bottom:1px solid var(--border);margin-bottom:0;}
  .hdr-inner{display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:8px;}
  .hdr h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(2rem,6vw,3.2rem);letter-spacing:0.06em;line-height:1;color:var(--text);}
  .hdr h1 em{color:var(--green);font-style:normal;}
  .hdr-sub{font-family:'IBM Plex Mono',monospace;font-size:0.62rem;color:var(--muted);letter-spacing:0.12em;text-transform:uppercase;margin-top:3px;}
  .hdr-date{font-family:'IBM Plex Mono',monospace;font-size:0.65rem;color:var(--subtext);letter-spacing:0.08em;text-transform:uppercase;text-align:right;}

  /* TABS */
  .tabs{display:flex;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:10;}
  .tab{font-family:'IBM Plex Mono',monospace;font-size:0.65rem;letter-spacing:0.12em;text-transform:uppercase;padding:11px 16px;background:none;border:none;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color 0.15s,border-color 0.15s;}
  .tab.active{color:var(--green);border-bottom-color:var(--green);}
  .pane{display:none;padding-top:20px;}
  .pane.active{display:block;}

  /* LEAGUE BAR */
  .league-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px;padding-bottom:16px;border-bottom:1px solid var(--border);}
  .lchip{font-family:'IBM Plex Mono',monospace;font-size:0.6rem;letter-spacing:0.07em;padding:5px 10px;border-radius:3px;background:var(--surface);border:1px solid var(--border);color:var(--subtext);cursor:pointer;transition:all 0.12s;white-space:nowrap;}
  .lchip.active{background:var(--green-dim);border-color:var(--green);color:var(--green);}
  .lchip:hover:not(.active){border-color:var(--subtext);}

  /* LOAD BTN */
  .load-row{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
  .load-btn{font-family:'IBM Plex Mono',monospace;font-size:0.68rem;letter-spacing:0.1em;text-transform:uppercase;padding:9px 18px;background:var(--green-dim);border:1px solid var(--green);color:var(--green);border-radius:3px;cursor:pointer;transition:background 0.15s;}
  .load-btn:hover{background:rgba(0,230,118,0.22);}
  .load-btn:disabled{opacity:0.35;cursor:not-allowed;}
  .load-status{font-family:'IBM Plex Mono',monospace;font-size:0.65rem;color:var(--subtext);}

  /* FIXTURE LIST */
  .fixture-list{display:flex;flex-direction:column;gap:6px;margin-bottom:20px;}
  .fixture{background:var(--card);border:1px solid var(--border);border-radius:4px;padding:12px 14px;display:grid;grid-template-columns:1fr auto 1fr auto;gap:8px;align-items:center;cursor:pointer;transition:border-color 0.15s,background 0.15s;}
  .fixture:hover{border-color:var(--subtext);background:var(--card2);}
  .fixture.selected{border-color:var(--green);background:var(--green-dim);}
  .fixture.analyzed-bet{border-left:3px solid var(--green);}
  .fixture.analyzed-skip{border-left:3px solid var(--red);}
  .fx-team{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:0.04em;line-height:1.1;}
  .fx-team.right{text-align:right;}
  .fx-time{font-family:'IBM Plex Mono',monospace;font-size:0.62rem;color:var(--subtext);text-align:center;white-space:nowrap;}
  .fx-badge{font-family:'IBM Plex Mono',monospace;font-size:0.58rem;letter-spacing:0.06em;padding:2px 7px;border-radius:2px;text-transform:uppercase;white-space:nowrap;}
  .fx-badge.bet{background:var(--green-dim);color:var(--green);border:1px solid var(--green);}
  .fx-badge.skip{background:var(--red-dim);color:var(--red);border:1px solid var(--red);}
  .fx-badge.pending{background:rgba(64,196,255,0.08);color:var(--blue);border:1px solid var(--blue);}
  .fx-badge.none{opacity:0;}

  /* ANALYSIS PANEL */
  .analysis-panel{background:var(--card);border:1px solid var(--border);border-radius:4px;overflow:hidden;margin-bottom:20px;animation:slideIn 0.2s ease;}
  @keyframes slideIn{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);}}

  .ap-header{padding:14px 16px;background:var(--card2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
  .ap-teams{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:0.05em;}
  .ap-teams em{color:var(--subtext);font-style:normal;font-size:0.9rem;margin:0 6px;}
  .ap-verdict{font-family:'IBM Plex Mono',monospace;font-size:0.75rem;font-weight:600;letter-spacing:0.1em;padding:5px 12px;border-radius:3px;text-transform:uppercase;}
  .ap-verdict.bet{background:var(--green-dim);color:var(--green);border:1px solid var(--green);}
  .ap-verdict.skip{background:var(--red-dim);color:var(--red);border:1px solid var(--red);}
  .ap-verdict.loading{background:rgba(64,196,255,0.08);color:var(--blue);border:1px solid var(--blue);}
  .ap-verdict.pending{background:rgba(61,79,92,0.3);color:var(--subtext);border:1px solid var(--border);}

  .ap-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);}
  @media(max-width:480px){.ap-stats{grid-template-columns:repeat(2,1fr);}}
  .stat{background:var(--card);padding:10px 12px;}
  .stat-lbl{font-family:'IBM Plex Mono',monospace;font-size:0.56rem;color:var(--subtext);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:3px;}
  .stat-val{font-family:'IBM Plex Mono',monospace;font-size:0.88rem;font-weight:600;}
  .stat-val.ok{color:var(--green);}
  .stat-val.bad{color:var(--red);}
  .stat-val.neu{color:var(--subtext);}

  .ap-checks{display:flex;flex-wrap:wrap;gap:5px;padding:12px 14px;border-top:1px solid var(--border);}
  .chk{font-family:'IBM Plex Mono',monospace;font-size:0.58rem;letter-spacing:0.05em;padding:3px 8px;border-radius:2px;}
  .chk.pass{background:var(--green-dim);color:var(--green);border:1px solid rgba(0,230,118,0.25);}
  .chk.fail{background:var(--red-dim);color:var(--red);border:1px solid rgba(255,82,82,0.25);}
  .chk.wait{background:rgba(61,79,92,0.2);color:var(--muted);border:1px solid var(--border);}

  /* H2H */
  .h2h-wrap{padding:12px 14px;border-top:1px solid var(--border);}
  .h2h-title{font-family:'IBM Plex Mono',monospace;font-size:0.58rem;color:var(--subtext);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:8px;}
  .h2h-row{display:grid;grid-template-columns:80px 1fr auto 24px;gap:6px;align-items:center;padding:4px 0;border-bottom:1px solid rgba(30,39,48,0.8);}
  .h2h-date{font-family:'IBM Plex Mono',monospace;font-size:0.58rem;color:var(--muted);}
  .h2h-teams{font-family:'IBM Plex Mono',monospace;font-size:0.6rem;color:var(--subtext);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .h2h-score{font-family:'IBM Plex Mono',monospace;font-size:0.68rem;font-weight:600;color:var(--text);text-align:right;}
  .h2h-tag{font-family:'IBM Plex Mono',monospace;font-size:0.55rem;font-weight:600;text-align:center;}
  .h2h-tag.o{color:var(--green);}
  .h2h-tag.u{color:var(--muted);}

  /* ODDS ROW */
  .odds-row{padding:12px 14px;border-top:1px solid var(--border);display:grid;grid-template-columns:auto 1fr 1fr auto;gap:8px;align-items:end;}
  @media(max-width:480px){.odds-row{grid-template-columns:1fr 1fr;}.odds-save{grid-column:1/-1;}}
  .odds-field{display:flex;flex-direction:column;gap:3px;}
  .odds-lbl{font-family:'IBM Plex Mono',monospace;font-size:0.56rem;color:var(--subtext);letter-spacing:0.08em;text-transform:uppercase;}
  .odds-input{background:var(--surface);border:1px solid var(--border);border-radius:3px;color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:0.8rem;padding:7px 10px;outline:none;transition:border-color 0.15s;width:100%;}
  .odds-input:focus{border-color:var(--blue);}
  .odds-select{background:var(--surface);border:1px solid var(--border);border-radius:3px;color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:0.72rem;padding:7px 8px;outline:none;cursor:pointer;}
  .odds-note{font-family:'IBM Plex Mono',monospace;font-size:0.56rem;color:var(--green);margin-top:3px;}
  .save-btn{padding:8px 14px;font-family:'IBM Plex Mono',monospace;font-size:0.65rem;letter-spacing:0.08em;text-transform:uppercase;background:var(--green-dim);border:1px solid var(--green);color:var(--green);border-radius:3px;cursor:pointer;transition:background 0.15s;white-space:nowrap;height:36px;}
  .save-btn:hover{background:rgba(0,230,118,0.22);}
  .save-btn:disabled{opacity:0.3;cursor:not-allowed;}

  /* ERR */
  .ap-err{padding:14px 16px;font-family:'IBM Plex Mono',monospace;font-size:0.68rem;color:var(--red);}

  /* SPINNER */
  .spin{display:inline-block;width:11px;height:11px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:sp 0.6s linear infinite;vertical-align:middle;margin-right:5px;}
  @keyframes sp{to{transform:rotate(360deg);}}

  /* SECTION LABEL */
  .sec-lbl{font-family:'Bebas Neue',sans-serif;font-size:0.85rem;letter-spacing:0.12em;color:var(--subtext);margin-bottom:10px;}

  /* TRACKER */
  .t-stats{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:16px;}
  @media(max-width:520px){.t-stats{grid-template-columns:repeat(2,1fr);}}
  .t-tile{background:var(--card);border:1px solid var(--border);border-radius:4px;padding:12px;text-align:center;}
  .t-big{font-family:'Bebas Neue',sans-serif;font-size:1.9rem;line-height:1;}
  .t-small{font-family:'IBM Plex Mono',monospace;font-size:0.56rem;color:var(--subtext);margin-top:3px;letter-spacing:0.08em;text-transform:uppercase;}
  .col-g{color:var(--green);}.col-r{color:var(--red);}.col-a{color:var(--amber);}.col-b{color:var(--blue);}

  .pl-bar{height:4px;background:var(--surface);border-radius:2px;margin-bottom:18px;overflow:hidden;}
  .pl-fill{height:100%;border-radius:2px;transition:width 0.4s;}
  .pl-pos{background:var(--green);}.pl-neg{background:var(--red);}

  .bet-list{display:flex;flex-direction:column;gap:8px;}
  .bet-card{background:var(--card);border:1px solid var(--border);border-radius:4px;padding:12px 14px;display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;}
  .bet-card.won{border-left:3px solid var(--green);}
  .bet-card.lost{border-left:3px solid var(--red);}
  .bet-card.pending-result{border-left:3px solid var(--amber);}
  .bet-teams{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:0.04em;}
  .bet-meta{font-family:'IBM Plex Mono',monospace;font-size:0.6rem;color:var(--subtext);margin-top:4px;}
  .bet-pl{font-family:'IBM Plex Mono',monospace;font-size:0.65rem;margin-top:3px;}
  .bet-pl.won{color:var(--green);}.bet-pl.lost{color:var(--red);}
  .res-btns{display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end;}
  .rb{padding:4px 8px;font-family:'IBM Plex Mono',monospace;font-size:0.58rem;letter-spacing:0.05em;text-transform:uppercase;border-radius:3px;cursor:pointer;transition:background 0.12s;}
  .rb.w{background:var(--green-dim);border:1px solid var(--green);color:var(--green);}
  .rb.l{background:var(--red-dim);border:1px solid var(--red);color:var(--red);}
  .rb.v{background:rgba(61,79,92,0.2);border:1px solid var(--muted);color:var(--muted);}
  .rb.d{background:none;border:1px solid var(--border);color:var(--muted);}
  .rb.d:hover{border-color:var(--red);color:var(--red);}

  .empty{text-align:center;padding:40px 0;font-family:'IBM Plex Mono',monospace;font-size:0.68rem;color:var(--muted);letter-spacing:0.07em;line-height:2;}

  /* TOAST */
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--green);color:#000;font-family:'IBM Plex Mono',monospace;font-size:0.68rem;letter-spacing:0.07em;padding:8px 16px;border-radius:3px;transition:transform 0.25s;z-index:999;pointer-events:none;}
  .toast.show{transform:translateX(-50%) translateY(0);}

  .no-fixtures{font-family:'IBM Plex Mono',monospace;font-size:0.68rem;color:var(--subtext);padding:20px 0;text-align:center;}
</style>
</head>
<body>

<div class="wrap">
  <div class="hdr">
    <div class="hdr-inner">
      <div>
        <h1>OVER <em>1.5</em> GOALS</h1>
        <div class="hdr-sub">Auto Analyzer · v3</div>
      </div>
      <div class="hdr-date" id="todayDate"></div>
    </div>
  </div>
</div>

<div class="wrap">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('fixtures')">TODAY'S FIXTURES</button>
    <button class="tab" onclick="switchTab('tracker')">RESULTS</button>
  </div>

  <!-- FIXTURES PANE -->
  <div class="pane active" id="pane-fixtures">

    <div class="sec-lbl">League</div>
    <div class="league-bar" id="leagueBar"></div>

    <div class="load-row">
      <button class="load-btn" id="loadBtn" onclick="loadFixtures()">Load Today's Matches</button>
      <span class="load-status" id="loadStatus"></span>
    </div>

    <div id="fixtureList" class="fixture-list"></div>
    <div id="analysisPanel"></div>

  </div>

  <!-- TRACKER PANE -->
  <div class="pane" id="pane-tracker">
    <div class="t-stats">
      <div class="t-tile"><div class="t-big col-b" id="t-tot">0</div><div class="t-small">Total</div></div>
      <div class="t-tile"><div class="t-big col-g" id="t-won">0</div><div class="t-small">Won</div></div>
      <div class="t-tile"><div class="t-big col-r" id="t-lost">0</div><div class="t-small">Lost</div></div>
      <div class="t-tile"><div class="t-big col-a" id="t-rate">—</div><div class="t-small">Win Rate</div></div>
      <div class="t-tile"><div class="t-big" id="t-pl">€0</div><div class="t-small">P&L</div></div>
    </div>
    <div class="pl-bar"><div class="pl-fill pl-pos" id="t-bar" style="width:0%"></div></div>
    <div class="bet-list" id="betList"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API_KEY = '5ab97ef9a9d942249c806323ac394018';
const BASE    = 'https://api.football-data.org/v4';
const PROXY   = 'https://corsproxy.io/?url=';

const LEAGUES = [
  {code:'PL',  name:'Premier League', flag:'🏴󠁧󠁢󠁥󠁮󠁧󠁿'},
  {code:'BL1', name:'Bundesliga',     flag:'🇩🇪'},
  {code:'SA',  name:'Serie A',        flag:'🇮🇹'},
  {code:'PD',  name:'La Liga',        flag:'🇪🇸'},
  {code:'FL1', name:'Ligue 1',        flag:'🇫🇷'},
  {code:'ELC', name:'Championship',   flag:'🏴󠁧󠁢󠁥󠁮󠁧󠁿'},
  {code:'PPL', name:'Primeira Liga',  flag:'🇵🇹'},
  {code:'DED', name:'Eredivisie',     flag:'🇳🇱'},
  {code:'CL',  name:'Champions Lg',  flag:'🇪🇺'},
];

let activeLeague = 'PL';
let fixtures     = [];
let standings    = {};  // teamId -> { gpg, form }
let selectedIdx  = null;
let analysisCache = {}; // matchId -> result
let oddsMap      = {}; // matchId -> {odds, fmt, stake}
let savedBets    = JSON.parse(localStorage.getItem('o15v3_bets') || '[]');

// ── HELPERS ───────────────────────────────────────────────────────────────────
async function api(path) {
  const r = await fetch(`/.netlify/functions/api?path=${encodeURIComponent(path)}`);
  if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
  return r.json();
}

function impliedProb(odds, fmt) {
  const o = parseFloat(odds);
  if (isNaN(o)) return null;
  if (fmt === 'decimal') return o <= 1 ? null : 1/o;
  if (o === 0) return null;
  return o < 0 ? Math.abs(o)/(Math.abs(o)+100) : 100/(o+100);
}

function potentialReturn(stake, odds, fmt) {
  const s = parseFloat(stake), o = parseFloat(odds);
  if (isNaN(s)||isNaN(o)||s<=0) return null;
  if (fmt==='decimal') return o<=1?null:(s*o).toFixed(2);
  const profit = o>0 ? s*(o/100) : s*(100/Math.abs(o));
  return (s+profit).toFixed(2);
}

function today() {
  return new Date().toISOString().slice(0,10);
}

function fmtTime(utc) {
  if (!utc) return '—';
  return new Date(utc).toLocaleTimeString('en-IE',{hour:'2-digit',minute:'2-digit'});
}

// ── STANDINGS → GPG + FORM ────────────────────────────────────────────────────
async function loadStandings(leagueCode) {
  standings = {};
  try {
    const data = await api(`/v4/competitions/${leagueCode}/standings`);
    const table = data.standings?.find(s=>s.type==='TOTAL')?.table || [];
    table.forEach(row => {
      const gpg = row.playedGames > 0 ? (row.goalsFor / row.playedGames) : 0;
      // form is "W,W,L,D,W" — count non-draws/losses as scored? 
      // Better: use goalsFor/played as proxy; form string for display
      const formStr = row.form || '';
      const formArr = formStr.split(',').filter(Boolean).slice(0,5);
      standings[row.team.id] = {
        gpg: gpg.toFixed(2),
        formStr: formArr.join(''),
        teamId: row.team.id,
        goalsFor: row.goalsFor,
        played: row.playedGames,
        crest: row.team.crest
      };
    });
  } catch(e) { console.warn('Standings error', e); }
}

// ── LOAD TODAY'S FIXTURES ─────────────────────────────────────────────────────
async function loadFixtures() {
  const btn = document.getElementById('loadBtn');
  const status = document.getElementById('loadStatus');
  btn.disabled = true;
  status.innerHTML = '<span class="spin"></span>Loading...';
  selectedIdx = null;
  analysisCache = {};
  document.getElementById('analysisPanel').innerHTML = '';

  const t = today();
  const tomorrow = new Date(Date.now()+86400000).toISOString().slice(0,10);

  try {
    await loadStandings(activeLeague);
    const data = await api(`/v4/competitions/${activeLeague}/matches?dateFrom=${t}&dateTo=${tomorrow}&status=SCHEDULED%2CTIMED`);
    fixtures = data.matches || [];
    status.textContent = fixtures.length > 0 ? `${fixtures.length} match${fixtures.length!==1?'es':''} found` : 'No matches today';
    renderFixtures();
  } catch(e) {
    status.textContent = `Error: ${e.message}`;
    fixtures = [];
    renderFixtures();
  }
  btn.disabled = false;
}

// ── RENDER FIXTURES ───────────────────────────────────────────────────────────
function renderFixtures() {
  const el = document.getElementById('fixtureList');
  if (fixtures.length === 0) {
    el.innerHTML = '<div class="no-fixtures">No scheduled matches found for today in this league.</div>';
    return;
  }
  el.innerHTML = fixtures.map((m,i) => {
    const cache = analysisCache[m.id];
    const verdict = cache?.verdict || 'none';
    const badgeClass = verdict==='none'?'none':verdict==='pending'?'pending':verdict;
    const badgeText  = verdict==='none'?'':verdict==='pending'?'...':verdict==='bet'?'BET':'SKIP';
    const selected   = selectedIdx === i;
    let rowClass = 'fixture';
    if (selected) rowClass += ' selected';
    if (cache && cache.verdict !== 'pending') rowClass += ` analyzed-${cache.verdict}`;
    return `<div class="${rowClass}" onclick="selectFixture(${i})">
      <div class="fx-team">${m.homeTeam.shortName||m.homeTeam.name}</div>
      <div class="fx-time">${fmtTime(m.utcDate)}<br><span style="font-size:0.5rem;color:var(--muted);">TAP</span></div>
      <div class="fx-team right">${m.awayTeam.shortName||m.awayTeam.name}</div>
      <div class="fx-badge ${badgeClass}">${badgeText}</div>
    </div>`;
  }).join('');
}

// ── SELECT FIXTURE ────────────────────────────────────────────────────────────
async function selectFixture(idx) {
  selectedIdx = idx;
  renderFixtures();

  const match = fixtures[idx];
  if (!oddsMap[match.id]) oddsMap[match.id] = {odds:'', fmt:'decimal', stake:''};

  // If already cached, just render
  if (analysisCache[match.id] && analysisCache[match.id].verdict !== 'loading') {
    renderAnalysis(match);
    return;
  }

  // Mark loading
  analysisCache[match.id] = {verdict:'loading'};
  renderAnalysis(match);

  try {
    // Fetch H2H using match ID directly
    const h2hData = await api(`/v4/matches/${match.id}/head2head?limit=10`);
    const h2hMatches = h2hData.matches || [];

    // Fetch team form from their recent matches
    const [homeMatches, awayMatches] = await Promise.all([
      api(`/v4/teams/${match.homeTeam.id}/matches?status=FINISHED&limit=5`),
      api(`/v4/teams/${match.awayTeam.id}/matches?status=FINISHED&limit=5`)
    ]);

    // Calculate form (scored in X of last 5)
    function calcForm(teamId, matches) {
      return (matches.matches||[]).slice(0,5).filter(m => {
        const isHome = m.homeTeam.id === teamId;
        const scored = isHome ? m.score?.fullTime?.home : m.score?.fullTime?.away;
        return scored != null && scored > 0;
      }).length;
    }

    const homeForm = calcForm(match.homeTeam.id, homeMatches);
    const awayForm = calcForm(match.awayTeam.id, awayMatches);

    // GPG from standings or calculate from recent matches
    const homeStanding = standings[match.homeTeam.id];
    const awayStanding = standings[match.awayTeam.id];

    function calcGPG(teamId, matchesData) {
      const ms = (matchesData.matches||[]).slice(0,10);
      if (ms.length===0) return 0;
      const total = ms.reduce((sum,m) => {
        const isHome = m.homeTeam.id === teamId;
        return sum + ((isHome ? m.score?.fullTime?.home : m.score?.fullTime?.away) || 0);
      }, 0);
      return total / ms.length;
    }

    const homeGPG = homeStanding ? parseFloat(homeStanding.gpg) : calcGPG(match.homeTeam.id, homeMatches);
    const awayGPG = awayStanding ? parseFloat(awayStanding.gpg) : calcGPG(match.awayTeam.id, awayMatches);

    // H2H over 1.5 rate
    const h2hOver = h2hMatches.filter(m => {
      const total = (m.score?.fullTime?.home||0) + (m.score?.fullTime?.away||0);
      return total >= 2;
    }).length;
    const h2hRate = h2hMatches.length > 0 ? h2hOver / h2hMatches.length : 0;

    analysisCache[match.id] = {
      verdict: 'pending',
      homeGPG: homeGPG.toFixed(2),
      awayGPG: awayGPG.toFixed(2),
      homeForm, awayForm,
      h2hRate, h2hMatches,
      h2hOver, h2hTotal: h2hMatches.length
    };

  } catch(e) {
    analysisCache[match.id] = {verdict:'error', error: e.message};
  }

  calcVerdict(match.id);
  renderFixtures();
  renderAnalysis(match);
}

// ── CALC VERDICT ──────────────────────────────────────────────────────────────
function calcVerdict(matchId) {
  const c = analysisCache[matchId];
  if (!c || c.verdict === 'loading' || c.verdict === 'error') return;
  const od = oddsMap[matchId] || {};
  const imp = impliedProb(od.odds, od.fmt||'decimal');

  c.checks = {
    gpgA:  {pass: parseFloat(c.homeGPG)>=1.0, val: c.homeGPG||'—', label:'Home GPG ≥ 1.0'},
    gpgB:  {pass: parseFloat(c.awayGPG)>=1.0, val: c.awayGPG||'—', label:'Away GPG ≥ 1.0'},
    h2h:   {pass: c.h2hRate>=0.80 && c.h2hRate<=0.86, val: c.h2hTotal>0?(c.h2hRate*100).toFixed(0)+'%':'N/A', label:'H2H 80–86%'},
    formA: {pass: c.homeForm>=4, val: c.homeForm+'/5', label:'Home scored 4/5'},
    formB: {pass: c.awayForm>=4, val: c.awayForm+'/5', label:'Away scored 4/5'},
    odds:  {pass: imp!==null && imp<0.87, val: imp?(imp*100).toFixed(1)+'%':'—', label:'Implied < 87%'},
  };

  const hasOdds = od.odds !== '';
  const allPass = Object.values(c.checks).every(ch=>ch.pass);
  c.verdict = hasOdds && allPass ? 'bet' : (hasOdds ? 'skip' : 'pending');
}

// ── RENDER ANALYSIS ───────────────────────────────────────────────────────────
function renderAnalysis(match) {
  const panel = document.getElementById('analysisPanel');
  const c = analysisCache[match.id];
  const od = oddsMap[match.id] || {odds:'', fmt:'decimal', stake:''};

  if (!c) { panel.innerHTML = ''; return; }

  let body = '';

  if (c.verdict === 'loading') {
    body = `<div style="padding:16px;font-family:'IBM Plex Mono',monospace;font-size:0.68rem;color:var(--subtext);">
      <span class="spin"></span>Fetching H2H & team stats...</div>`;
  } else if (c.verdict === 'error') {
    body = `<div class="ap-err">⚠ ${c.error}</div>`;
  } else {
    const payStr = potentialReturn(od.stake, od.odds, od.fmt||'decimal');
    const checks = c.checks || {};
    const mid = match.id;

    body = `
    <div class="ap-stats">
      ${[
        {l:'Home GPG', v:c.homeGPG||'—', ok: parseFloat(c.homeGPG)>=1.0},
        {l:'Away GPG', v:c.awayGPG||'—', ok: parseFloat(c.awayGPG)>=1.0},
        {l:'H2H Over 1.5', v:c.h2hTotal>0?(c.h2hRate*100).toFixed(0)+'% ('+c.h2hOver+'/'+c.h2hTotal+')':'N/A', ok:c.h2hRate>=0.80&&c.h2hRate<=0.86},
        {l:'Home Form', v:(c.homeForm||0)+'/5', ok:(c.homeForm||0)>=4},
        {l:'Away Form', v:(c.awayForm||0)+'/5', ok:(c.awayForm||0)>=4},
        {l:'Implied Prob', v:od.odds?(impliedProb(od.odds,od.fmt||'decimal')*100).toFixed(1)+'%':'Enter odds', ok:od.odds&&impliedProb(od.odds,od.fmt||'decimal')<0.87},
      ].map(s=>`<div class="stat"><div class="stat-lbl">${s.l}</div><div class="stat-val ${s.v==='Enter odds'?'neu':s.ok?'ok':'bad'}">${s.v}</div></div>`).join('')}
    </div>

    <div class="ap-checks">
      ${Object.values(checks).map(ch=>`<span class="chk ${ch.pass?'pass':'fail'}">${ch.label}</span>`).join('')}
      ${Object.keys(checks).length===0?'<span class="chk wait">Enter odds to complete check</span>':''}
    </div>

    ${c.h2hMatches && c.h2hMatches.length > 0 ? `
    <div class="h2h-wrap">
      <div class="h2h-title">Head to Head · Last ${c.h2hMatches.length}</div>
      ${c.h2hMatches.map(m=>{
        const total=(m.score?.fullTime?.home||0)+(m.score?.fullTime?.away||0);
        const over=total>=2;
        const date=m.utcDate?m.utcDate.slice(0,10):'—';
        return `<div class="h2h-row">
          <span class="h2h-date">${date}</span>
          <span class="h2h-teams">${m.homeTeam.shortName||m.homeTeam.name} v ${m.awayTeam.shortName||m.awayTeam.name}</span>
          <span class="h2h-score">${m.score?.fullTime?.home??'?'}–${m.score?.fullTime?.away??'?'}</span>
          <span class="h2h-tag ${over?'o':'u'}">${over?'O':'U'}</span>
        </div>`;
      }).join('')}
    </div>` : ''}

    <div class="odds-row">
      <div class="odds-field">
        <div class="odds-lbl">Format</div>
        <select class="odds-select" onchange="updateOdds(${mid},'fmt',this.value)">
          <option value="decimal" ${od.fmt==='decimal'?'selected':''}>Dec</option>
          <option value="american" ${od.fmt==='american'?'selected':''}>US</option>
        </select>
      </div>
      <div class="odds-field">
        <div class="odds-lbl">Odds</div>
        <input class="odds-input" type="number" step="0.01" placeholder="${od.fmt==='decimal'?'1.55':'-180'}"
          value="${od.odds}" oninput="updateOdds(${mid},'odds',this.value)">
        ${payStr?`<div class="odds-note">→ €${payStr} return</div>`:''}
      </div>
      <div class="odds-field">
        <div class="odds-lbl">Stake €</div>
        <input class="odds-input" type="number" step="0.5" placeholder="5"
          value="${od.stake}" oninput="updateOdds(${mid},'stake',this.value)">
      </div>
      <button class="save-btn odds-save" ${c.verdict==='bet'?'':'disabled'} onclick="saveBet(${mid})">Save →</button>
    </div>`;
  }

  const vLabel = {loading:'<span class="spin"></span>LOADING', bet:'BET ✓', skip:'SKIP ✗', pending:'ENTER ODDS', error:'ERROR'}[c.verdict] || '—';
  const vClass = {loading:'loading',bet:'bet',skip:'skip',pending:'pending',error:'skip'}[c.verdict]||'pending';

  panel.innerHTML = `
  <div class="analysis-panel">
    <div class="ap-header">
      <div class="ap-teams">
        ${match.homeTeam.shortName||match.homeTeam.name}
        <em>vs</em>
        ${match.awayTeam.shortName||match.awayTeam.name}
      </div>
      <div class="ap-verdict ${vClass}">${vLabel}</div>
    </div>
    ${body}
  </div>`;

  // Scroll to panel smoothly
  panel.scrollIntoView({behavior:'smooth', block:'nearest'});
}

// ── UPDATE ODDS ───────────────────────────────────────────────────────────────
function updateOdds(matchId, key, val) {
  if (!oddsMap[matchId]) oddsMap[matchId] = {odds:'', fmt:'decimal', stake:''};
  oddsMap[matchId][key] = val;
  calcVerdict(matchId);
  const match = fixtures.find(m=>m.id===matchId);
  if (match) { renderAnalysis(match); renderFixtures(); }
}

// ── SAVE BET ──────────────────────────────────────────────────────────────────
function saveBet(matchId) {
  const c = analysisCache[matchId];
  const od = oddsMap[matchId]||{};
  if (!c || c.verdict !== 'bet') return;
  const match = fixtures.find(m=>m.id===matchId);
  if (!match) return;
  const imp = impliedProb(od.odds, od.fmt||'decimal');
  const pay = potentialReturn(od.stake, od.odds, od.fmt||'decimal');
  savedBets.unshift({
    id: Date.now(),
    date: new Date().toLocaleDateString('en-IE'),
    league: activeLeague,
    teamA: match.homeTeam.shortName||match.homeTeam.name,
    teamB: match.awayTeam.shortName||match.awayTeam.name,
    odds: od.odds, fmt: od.fmt||'decimal',
    impliedProb: imp?(imp*100).toFixed(1):'—',
    stake: parseFloat(od.stake)||0,
    payout: pay?parseFloat(pay):0,
    result:'pending'
  });
  localStorage.setItem('o15v3_bets', JSON.stringify(savedBets));
  renderTracker();
  showToast(`${match.homeTeam.shortName} vs ${match.awayTeam.shortName} saved ✓`);
}

// ── TRACKER ───────────────────────────────────────────────────────────────────
function setResult(id, result) {
  const b = savedBets.find(x=>x.id===id);
  if(b){b.result=result;localStorage.setItem('o15v3_bets',JSON.stringify(savedBets));renderTracker();}
}
function deleteBet(id) {
  savedBets=savedBets.filter(x=>x.id!==id);
  localStorage.setItem('o15v3_bets',JSON.stringify(savedBets));
  renderTracker();
}

function renderTracker() {
  const won=savedBets.filter(b=>b.result==='won');
  const lost=savedBets.filter(b=>b.result==='lost');
  const settled=savedBets.filter(b=>b.result!=='pending'&&b.result!=='void');
  const rate=settled.length>0?((won.length/settled.length)*100).toFixed(0)+'%':'—';
  let pl=0;
  won.forEach(b=>pl+=(b.payout-b.stake));
  lost.forEach(b=>pl-=b.stake);

  document.getElementById('t-tot').textContent=savedBets.filter(b=>b.result!=='void').length;
  document.getElementById('t-won').textContent=won.length;
  document.getElementById('t-lost').textContent=lost.length;
  document.getElementById('t-rate').textContent=rate;
  const plEl=document.getElementById('t-pl');
  plEl.textContent=(pl>=0?'+':'')+'€'+pl.toFixed(2);
  plEl.className='t-big '+(pl>=0?'col-g':'col-r');
  const pct=Math.min(Math.abs(pl)/Math.max(Math.abs(pl),10)*100,100);
  const bar=document.getElementById('t-bar');
  bar.style.width=pct+'%';
  bar.className='pl-fill '+(pl>=0?'pl-pos':'pl-neg');

  const list=document.getElementById('betList');
  if(savedBets.length===0){
    list.innerHTML='<div class="empty">No bets saved yet.<br>Load fixtures · tap a match · get BET verdict · save it.</div>';
    return;
  }
  list.innerHTML=savedBets.map(b=>{
    const odStr=b.fmt==='decimal'?b.odds+'x':b.odds;
    const plStr=b.result==='won'?`+€${(b.payout-b.stake).toFixed(2)}`:b.result==='lost'?`-€${b.stake.toFixed(2)}`:'';
    return `<div class="bet-card ${b.result==='pending'?'pending-result':b.result}">
      <div>
        <div class="bet-teams">${b.teamA} vs ${b.teamB}</div>
        <div class="bet-meta">${b.league} · ${b.date} · ${odStr} · Impl ${b.impliedProb}%${b.stake>0?' · €'+b.stake.toFixed(2):''}</div>
        ${plStr?`<div class="bet-pl ${b.result}">${plStr}</div>`:''}
      </div>
      <div class="res-btns">
        ${b.result==='pending'?`
          <button class="rb w" onclick="setResult(${b.id},'won')">Won</button>
          <button class="rb l" onclick="setResult(${b.id},'lost')">Lost</button>
          <button class="rb v" onclick="setResult(${b.id},'void')">Void</button>
        `:`<span style="font-family:'IBM Plex Mono',monospace;font-size:0.6rem;color:var(--subtext);text-transform:uppercase;">${b.result}</span>`}
        <button class="rb d" onclick="deleteBet(${b.id})">✕</button>
      </div>
    </div>`;
  }).join('');
}

// ── TABS / LEAGUE ─────────────────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('pane-'+name).classList.add('active');
  document.querySelectorAll('.tab').forEach(b=>{
    if(b.textContent.toLowerCase().includes(name==='fixtures'?'fix':'res')) b.classList.add('active');
  });
  if(name==='tracker') renderTracker();
}

function setLeague(code) {
  activeLeague=code;
  fixtures=[]; standings={}; analysisCache={}; selectedIdx=null;
  document.getElementById('fixtureList').innerHTML='';
  document.getElementById('analysisPanel').innerHTML='';
  document.getElementById('loadStatus').textContent='';
  renderLeagues();
}

function renderLeagues() {
  document.getElementById('leagueBar').innerHTML = LEAGUES.map(l=>
    `<div class="lchip ${l.code===activeLeague?'active':''}" onclick="setLeague('${l.code}')">${l.flag} ${l.name}</div>`
  ).join('');
}

function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
document.getElementById('todayDate').textContent = new Date().toLocaleDateString('en-IE',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
renderLeagues();
renderTracker();
</script>
